<body>

<div class="text-center mt-4">
  <img src="logo.png" width="130" class="logo-animation">
</div>

<nav class="navbar navbar-dark bg-dark shadow-sm">
  <div class="container">
    <span class="navbar-brand">
      Money Transfer Pro
    </span>
  </div>
</nav>

<section class="hero-section">
  <div class="container">

    <div class="card transfer-card shadow-lg">
      <div class="card-body p-4">

        <h2 class="text-center mb-4">سیستم انتقال پول</h2>

        <input id="senderName" class="form-control mb-2" placeholder="اسم ارسال کننده">
        <input id="receiverName" class="form-control mb-2" placeholder="اسم دریافت کننده">

        <select id="fromCountry" class="form-select mb-2"></select>
        <select id="toCountry" class="form-select mb-2"></select>
        <select id="province" class="form-select mb-2"></select>

        <input id="phone" class="form-control mb-3" placeholder="شماره تماس">

        <div id="bankCard" class="mb-3"></div>

        <div class="form-check mb-3">
          <input type="checkbox" id="confirmPayment" class="form-check-input">
          <label class="form-check-label">
            آیا پرداخت انجام شده؟
          </label>
        </div>

        <div id="uploadBox" class="d-none mb-3">
          <input type="file" id="receipt" class="form-control">
        </div>

        <button id="submitBtn" class="btn btn-primary w-100" disabled>
          ثبت حواله
        </button>

        <div id="loadingOverlay" class="d-none">
          <div class="loader-box">
            <img src="loading.gif" width="120">
            <p>در حال ثبت...</p>
          </div>
        </div>

        <div id="successBox" class="alert alert-success mt-3 d-none"></div>

      </div>
    </div>

  </div>
</section>

<script src="./app.js"></script>
</body>
