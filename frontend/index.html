<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Transfer Pro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
  <div class="container">
    <span class="navbar-brand">
      <i class="fa-solid fa-building-columns"></i>
      Money Transfer Pro
    </span>
  </div>
</nav>
<div id="bankCard" class="mt-4"></div>

<div class="form-check mt-4">

  <input
    class="form-check-input"
    type="checkbox"
    id="confirmPayment"
  >

  <label class="form-check-label">

  آیا مبلغ را به حساب صرافی EXIRAN واریز نموده اید؟

  </label>

</div>

<div id="uploadBox" class="d-none mt-4">

  <label class="form-label">
    آپلود رسید بانکی
  </label>

  <input
    type="file"
    id="receipt"
    class="form-control"
  >

</div>

<button
  id="submitBtn"
  disabled
  class="btn btn-primary w-100 mt-4"
  onclick="submitForm()"
>
ثبت حواله
</button>

<div id="loadingOverlay" class="d-none">

  <div class="loader-box">

    <img
      src="loading.gif"
      width="120"
    >

    <p class="mt-3">
      در حال ثبت اطلاعات...
    </p>

  </div>

</div>
<section class="hero-section">
  <div class="container">

    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card transfer-card shadow-lg">

          <div class="card-body p-4">

            <h2 class="text-center mb-4">سیستم انتقال پول</h2>

            <div class="row g-3">

              <div class="col-md-6">
                <input type="text" id="senderName" class="form-control" placeholder="اسم ارسال کننده">
              </div>

              <div class="col-md-6">
                <input type="text" id="receiverName" class="form-control" placeholder="اسم دریافت کننده">
              </div>

              <div class="col-md-6">
                <select id="fromCountry" class="form-select"></select>
              </div>

              <div class="col-md-6">
                <select id="toCountry" class="form-select"></select>
              </div>

              <div class="col-md-6">
                <select id="province" class="form-select"></select>
              </div>

              <div class="col-md-6">
                <input type="text" id="phone" class="form-control" placeholder="شماره تماس">
              </div>

            </div>

            <div class="bank-box mt-4">
              <h5 class="mb-3">
                <i class="fa-solid fa-credit-card"></i>
                اطلاعات پرداخت
              </h5>

              <div id="accountInfo">
                لطفاً کشور مبدا را انتخاب کنید
              </div>
            </div>

            <div class="mt-4">
              <label class="form-label">آپلود رسید پرداخت</label>
              <input type="file" id="receipt" class="form-control">
            </div>

            <button class="btn btn-primary w-100 mt-4" onclick="submitForm()">
              ثبت درخواست
            </button>

            <div id="loading" class="text-center mt-4 d-none">
              <div class="spinner-border text-primary"></div>
            </div>

            <div id="successBox" class="alert alert-success mt-4 d-none"></div>

          </div>

        </div>

      </div>
    </div>

  </div>
</section>

<script src="app.js"></script>
</body>
</html>
